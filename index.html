<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemu Sekai</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="logo">Gemu <span>Sekai</span></div>
    <nav>
      <input type="text" placeholder="Search...">
      <div class="wrapper-icons">
        <ion-icon class="icon" name="search"></ion-icon>
      </div>
    </nav>
  </header>
  <section class="recommended">
    <h2>Recommended</h2>
    <div class="game-grid">
      <div 
       data-url="play/roshambo/preview/index.html"
       class="game-card" 
       onClick="handleOpenGame(this)">
        <img src="assets/paperrockscissors.png" alt="Rock Paper Scissors">
        <p>Rock Paper Scissors</p>
      </div>
      <div 
       data-url="play/snake/preview/index.html"
       class="game-card" 
       onClick="handleOpenGame(this)">
        <img src="assets/snake.png" alt="Snake">
        <p>Snake</p>
      </div>
      <div
       data-url="play/tictactoe/preview/index.html"
       class="game-card"
       onClick="handleOpenGame(this)">
        <img src="assets/tictactoe.png" alt="Tic Tac Toe">
        <p>Tic Tac Toe</p>
      </div>
      <div
       data-url="https://www.crazygames.com/game/count-masters-stickman-games"
       class="game-card"
       onClick="handleOpenGame(this)">
        <img src="https://imgs.crazygames.com/count-masters-stickman-games_1x1/20250220041115/count-masters-stickman-games_1x1-cover?metadata=none&quality=75&width=127&dpr=2" alt="Count Masters">
        <p>Count Masters</p>
      </div>
      <div 
       data-url="https://www.crazygames.com/game/stickman-clash"
       class="game-card"
       onClick="handleOpenGame(this)">
        <img src="https://imgs.crazygames.com/stickman-clash_1x1/20250221023221/stickman-clash_1x1-cover?metadata=none&quality=75&width=127&dpr=2" alt="Stickman Clash">
        <p>Stickman Clash</p>
      </div>
      <div
       data-url="https://www.crazygames.com/game/piece-of-cake-merge-and-bake"
       class="game-card"
       onClick="handleOpenGame(this)">
        <img src="https://imgs.crazygames.com/piece-of-cake-merge-and-bake_1x1/20250528043012/piece-of-cake-merge-and-bake_1x1-cover?metadata=none&quality=75&width=127&dpr=2" alt="Piece of Cake">
        <p>Piece of Cake</p>
      </div>
    </div>
  </section>
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script src="script.js" type="text/javascript"></script>
</body>
</html>
